; BLEUltraGuitar — platformio.ini
;
; Two build environments:
;
;   BLEUltraGuitar      — normal serial flash  (default)
;   BLEUltraGuitar-OTA  — upload via WiFi/OTA
;
; OTA upload workflow:
;   1. Power the device while holding SELECT + START -> device enters OTA mode
;      (first time: connect to the "BLEUltraGuitar-OTA" AP and configure WiFi)
;   2. From PlatformIO:  pio run -e BLEUltraGuitar-OTA -t upload

[platformio]
default_envs = BLEUltraGuitar

; ── Shared settings for all environments ─────────────────────────────────────
[env]
framework               = arduino
platform                = espressif32
board                   = esp32dev
board_build.f_cpu       = 240000000L
monitor_speed           = 115200
monitor_filters         = esp32_exception_decoder

lib_deps =
    https://github.com/lemmingDev/ESP32-BLE-Gamepad.git#master
    tzapu/WiFiManager

; ── Serial flash (development) ───────────────────────────────────────────────
[env:BLEUltraGuitar]
upload_speed            = 2000000
upload_protocol         = esptool

; ── OTA flash (wireless) ─────────────────────────────────────────────────────
[env:BLEUltraGuitar-OTA]
upload_protocol         = espota
upload_port             = BLEUltraGuitar.local   ; mDNS hostname set in ota.cpp